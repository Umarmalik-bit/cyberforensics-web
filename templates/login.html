<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberForensics Station Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; width: 100%; max-width: 480px; padding: 2.5rem; }
        .brand-title { color: #38bdf8; font-size: 1.5rem; font-weight: 700; text-align: center; text-transform: uppercase; margin-bottom: 1.5rem; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .form-control { background-color: #0f172a; border: 1px solid #475569; color: #ffffff; margin-bottom: 1rem; }
        .form-control:focus { background-color: #0f172a; border-color: #38bdf8; color: #ffffff; box-shadow: none; }
        .btn-action { font-weight: 600; padding: 0.6rem; }
        .nav-tabs .nav-link { color: #94a3b8; border: none; font-weight: 500; }
        .nav-tabs .nav-link.active { background-color: transparent; color: #38bdf8; border-bottom: 2px solid #38bdf8; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-title">Forensic Workstation Access</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }} alert-sm py-2 text-center mb-3" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <ul class="nav nav-tabs justify-content-center mb-4" id="authTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginPanel" type="button" role="tab">Workstation Sign In</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerPanel" type="button" role="tab">Create Account</button>
            </li>
        </ul>

        <div class="tab-content" id="authTabsContent">
            <div class="tab-pane fade show active" id="loginPanel" role="tabpanel">
                <form action="/login" method="POST">
                    <label class="form-label small text-secondary">Analyst Username Identity</label>
                    <input type="text" class="form-control" name="username" required placeholder="Enter assigned keycode">
                    
                    <label class="form-label small text-secondary">Workstation Access Password</label>
                    <input type="password" class="form-control" name="password" required placeholder="••••••••">
                    
                    <div class="text-muted small mb-3 text-center">⚠️ Account permanently deletes after 3 wrong tries.</div>
                    <button type="submit" class="btn btn-primary w-100 btn-action rounded-3">Access Console Environment</button>
                </form>
            </div>

            <div class="tab-pane fade" id="registerPanel" role="tabpanel">
                <form action="/register" method="POST">
                    <label class="form-label small text-secondary">Choose New Username Profile</label>
                    <input type="text" class="form-control" name="username" required placeholder="Choose identity text">
                    
                    <label class="form-label small text-secondary">Set Cryptographic Password</label>
                    <input type="password" class="form-control" name="password" required placeholder="Set strong passphrase">
                    
                    <button type="submit" class="btn btn-success w-100 btn-action rounded-3 text-white">Provision New Profile Ledger</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
