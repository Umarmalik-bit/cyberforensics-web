<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberForensics Lab Workstation — Session Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
        }
        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-title {
            color: #38bdf8;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }
        .brand-subtitle {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .form-label {
            color: #cbd5e1;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-control {
            background-color: #0f172a;
            border: 1px solid #475569;
            color: #ffffff;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background-color: #0f172a;
            border-color: #38bdf8;
            color: #ffffff;
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25);
        }
        .btn-auth {
            background-color: #0284c7;
            border: none;
            color: white;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
        }
        .btn-auth:hover {
            background-color: #0369a1;
            transform: translateY(-1px);
        }
        .alert {
            font-size: 0.875rem;
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-header">
            <div class="brand-title">Forensic Node</div>
            <div class="brand-subtitle">Secure Investigator Authentication Gateway</div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' or category == 'danger' else 'info' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            
            <div class="mb-4">
                <label for="username" class="form-label">Analyst Identity Code</label>
                <input type="text" 
                       class="form-control" 
                       id="username" 
                       name="username" 
                       required 
                       placeholder="Enter username (e.g., admin)"
                       autocomplete="off">
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">System Security Password</label>
                <input type="password" 
                       class="form-control" 
                       id="password" 
                       name="password" 
                       required 
                       placeholder="Enter password (e.g., admin123)">
            </div>

            <button type="submit" class="btn btn-auth w-100 rounded-3 mt-2">Initialize Workstation</button>
            
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
