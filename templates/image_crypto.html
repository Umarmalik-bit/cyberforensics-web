<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Cryptographic Transformation Node</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .card-custom { background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; }
        .card-header-custom { border-bottom: 1px solid #334155; color: #38bdf8; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; padding: 1rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 border-bottom border-secondary">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-info fw-bold" href="/dashboard">⬅️ BACK TO COCKPIT</a>
            <span class="navbar-text text-warning fw-bold">MODULE 8: SYMMETRICAL DATA MATRIX CRYPTO ENGINE</span>
        </div>
    </nav>

    <div class="container max-width-md mt-5">
        <div class="card card-custom">
            <div class="card-header-custom">Secure Image Cryptographic Symmetrical Masking System</div>
            <div class="card-body">
                <form action="/image-crypto" method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label text-slate-300">Select Forensic Image Asset Target:</label>
                        <input type="file" name="image_file" class="form-control bg-dark text-white border-secondary" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-slate-300">Enter 4-Digit Encryption/Decryption Key PIN:</label>
                        <input type="password" name="pin" class="form-control bg-dark text-white border-secondary" maxlength="4" pattern="\d{4}" placeholder="e.g., 5729" required>
                        <div class="form-text text-secondary">The seed PIN is processed utilizing a bitwise symmetrical XOR arithmetic loop sequence.</div>
                    </div>

                    <div class="row g-3">
                        <div class="col-6">
                            <button type="submit" name="action" value="encrypt" class="btn btn-danger w-100 py-2 fw-bold">Execute Encryption Layer</button>
                        </div>
                        <div class="col-6">
                            <button type="submit" name="action" value="decrypt" class="btn btn-info w-100 py-2 fw-bold text-dark">Reverse Cipher Decryption</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
